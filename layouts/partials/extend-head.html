<link rel="stylesheet" href="/css/custom.css">

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Procura o primeiro h1 na home (que é o título do conteúdo)
  const title = document.querySelector('.home-info-content h1, .post-content h1, main h1');
  if (title) {
    const text = title.textContent;
    title.textContent = '';
    title.style.overflow = 'hidden';
    title.style.whiteSpace = 'nowrap';
    title.style.borderRight = '3px solid #58a6ff';
    title.style.animation = 'blink 0.75s step-end infinite';
    let i = 0;
    
    function type() {
      if (i < text.length) {
        title.textContent += text.charAt(i);
        i++;
        setTimeout(type, 100);
      }
    }
    
    type();
  }
});
</script>

<style>
@keyframes blink {
  from, to { border-color: transparent; }
  50% { border-color: #58a6ff; }
}
</style>
